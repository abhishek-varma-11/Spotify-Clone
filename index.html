<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/utility.css">
</head>
<body>
    <div class="navbar flex justify-content items-center">
        <div class="navbar-left flex"></div>
        <img src="logos and buttons/logo.svg" alt="logo">
        <button class = "home-btn">
            <img id = "home" src="logos and buttons/home.svg" alt="home symbol">
        </button>
    </div>
    <div class="container flex">
        <div class = "left box" style="background-color: rgb(16, 16, 16);">
            <div class="top flex">
                <p class="bold">Your Library</p>
                <button class="createbtn flex items-center">
                    <img src="logos and buttons/add.svg" alt="add Btn">
                    <p>Create</p>
                </button>
            </div>
            <div class="playlist-container">
                <div class="box">
                    <p class="mainText">Create your first playlist</p>
                    <p class="secondLine">It's easy, we'll help you </p>
                    <button class="btn">Create Playlist</button>
                </div>
                <div class="box">
                    <p class="mainText">Let's find some podcasts to follow</p>
                    <p class="secondLine">We'll keep you updated on new episodes</p>
                    <button class="btn">Browse podcasts</button>
                </div>
            </div>
            <div class =  "list-leftBottom flex">
                <ul id = "list">
                    <li>Legal</li>
                    <li>Safety & Privacy Center</li>
                    <li>Privacy Policy</li>
                    <li>Cookies</li>
                    <li>About Ads</li>
                    <li>Accessibility</li>
                    <li class = "bold">Cookies</li>
                </ul>
            </div>
            <div>
                <button class="language-btn flex justify-content items-center">
                    <img src="logos and buttons/language.svg" alt="universal-symbol">
                    <p>English</p>
                </button>
            </div>
        </div>
        <div class = "right"></div>
    </div>
</body>
</html>
