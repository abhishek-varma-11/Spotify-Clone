<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/utility.css">
</head>
<body>
    <div class="navbar flex justify-content items-center">
        <img src="logos and buttons/logo.svg" alt="logo">
    </div>
    <div class="container flex">
        <div class = "left">
            <div class="top flex">
                <p class="bold">Your Library</p>
                <button class="createbtn flex items-center">
                    <img src="logos and buttons/add.svg" alt="add Btn">
                    <p>Create</p>
                </button>
            </div>
            <div class="playlist-container">
                <div class="box">
                    <p class="mainText">Create your first playlist</p>
                    <p class="secondLine">It's easy, we'll help you </p>
                    <button class="btn">Create Playlist</button>
                </div>
                <div class="box">
                    <p class="mainText">Let's find some podcasts to follow</p>
                    <p class="secondLine">We'll keep you updated on new episodes</p>
                    <button class="btn">Browse podcasts</button>
                </div>
            </div>
        </div>
        <div class = "right"></div>
    </div>
</body>
</html>
